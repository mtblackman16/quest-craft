<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Team</title>
<style>
  @page { margin: 0.5in; }
  body { font-family: 'Segoe UI', Arial, sans-serif; padding: 0.25in; color: #1a1a2e; }
  h2 { text-align: center; font-size: 24pt; margin-bottom: 0.3in; }
  .photo { text-align: center; margin-bottom: 0.3in; border: 2px solid #ddd; padding: 4px; }
  .photo img { max-width: 100%; }
  .photo .placeholder { color: #666; padding: 0.5in; font-size: 12pt; }
  .members { display: flex; gap: 0.2in; justify-content: center; flex-wrap: wrap; }
  .member { text-align: center; width: 1.6in; }
  .member .name { font-size: 16pt; font-weight: bold; color: #7de650; }
  .member .age { font-size: 11pt; color: #888; }
  .member .role { font-size: 11pt; color: #444; margin-top: 2px; }
  .ai-note { text-align: center; margin-top: 0.3in; padding: 0.15in; background: #f0fff0; border-radius: 8px; border: 1px solid #7de650; }
  .ai-note strong { color: #7de650; }
</style>
</head>
<body>
  <h2>The Team</h2>

  <div class="photo">
    <div class="placeholder">[Paste team photo here]</div>
  </div>

  <div class="members">
    <div class="member">
      <div class="name">Ethan</div>
      <div class="age">Age 9</div>
      <div class="role">Co-Creator &amp; Game Designer</div>
    </div>
    <div class="member">
      <div class="name">Eins</div>
      <div class="age">Age 12</div>
      <div class="role">Co-Creator &amp; Game Designer</div>
    </div>
    <div class="member">
      <div class="name">Andrew</div>
      <div class="age">Age 12</div>
      <div class="role">Artist &amp; Co-Creator</div>
    </div>
    <div class="member">
      <div class="name">Nathan</div>
      <div class="age">Age 9</div>
      <div class="role">Co-Creator &amp; Game Designer</div>
    </div>
  </div>

  <div class="ai-note">
    <strong>+ Claude (AI)</strong> &mdash; Our engineering partner. We designed everything. Claude wrote the code.
  </div>
</body>
</html>
