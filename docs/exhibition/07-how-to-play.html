<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Controller Setup - SPLIT</title>
<style>
  @page { size: 11in 8.5in; margin: 0; }
  @media print { @page { margin: 0; } }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 11in;
    height: 8.5in;
    overflow: hidden;
    background: #0f0f1f;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #ffffff;
  }
  .page {
    width: 11in;
    height: 8.5in;
    padding: 0.25in 0.3in;
    display: flex;
    flex-direction: column;
  }
  h1 {
    text-align: center;
    font-size: 26pt;
    color: #7de650;
    text-shadow: 0 0 12px rgba(125,230,80,0.2);
  }
  .subtitle {
    text-align: center;
    font-size: 12pt;
    color: #d4a456;
    margin-bottom: 0.15in;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    flex: 1;
  }
  .cell {
    display: flex;
    align-items: center;
    padding: 0 20px;
    border-radius: 8px;
    border: 1px solid rgba(125,230,80,0.2);
  }
  .cell:nth-child(odd) { background: rgba(125,230,80,0.06); }
  .cell:nth-child(even) { background: rgba(255,255,255,0.03); }
  .btn {
    color: #7de650;
    font-weight: 700;
    font-size: 16pt;
    width: 2in;
    flex-shrink: 0;
  }
  .act { color: #e0e0e0; font-size: 14pt; }
  .note { color: #d4a456; font-size: 10pt; font-style: italic; margin-left: 6px; }
</style>
</head>
<body>
<div class="page">
  <h1>Controller Setup</h1>
  <p class="subtitle">Nintendo Switch Pro Controller</p>
  <div class="grid">
    <div class="cell"><span class="btn">Left Stick</span><span class="act">Move</span></div>
    <div class="cell"><span class="btn">A</span><span class="act">Jump</span></div>
    <div class="cell"><span class="btn">B</span><span class="act">Jelly Shot<span class="note">(costs health!)</span></span></div>
    <div class="cell"><span class="btn">X</span><span class="act">Eat / Heal</span></div>
    <div class="cell"><span class="btn">Y</span><span class="act">Interact</span></div>
    <div class="cell"><span class="btn">Stick Down</span><span class="act">Ground Pound</span></div>
    <div class="cell"><span class="btn">ZL</span><span class="act">Split / Combine</span></div>
    <div class="cell"><span class="btn">ZR</span><span class="act">Perfect Dodge</span></div>
  </div>
</div>
</body>
</html>
