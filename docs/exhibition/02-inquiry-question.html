<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Inquiry Question</title>
<style>
  @page { size: 8.5in 11in; margin: 0.4in; }
  body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #0f0f1f; color: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 9.2in; }
  .label { font-size: 14pt; color: #d4a456; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.5em; }
  .question { font-size: 30pt; font-weight: bold; color: #ffffff; line-height: 1.4; max-width: 7in; }
  .accent { display: block; width: 80px; height: 3px; background: #7de650; margin: 0.6in auto 0; border-radius: 2px; box-shadow: 0 0 12px rgba(125,230,80,0.4); }
</style>
</head>
<body>
  <div class="label">Our Inquiry Question</div>
  <div class="question">What can kids create when they have AI as an engineering partner?</div>
  <div class="accent"></div>
</body>
</html>
